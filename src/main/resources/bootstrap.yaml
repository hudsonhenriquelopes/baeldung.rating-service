spring:
  cloud:
    config:
      name: "rating-service"
      discovery:
        service-id: config
        enabled: true
      username: configUser
      password: configPassword
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
eureka.client.serviceUrl.defaultZone: http://discUser:discPassword@localhost:8082/eureka/